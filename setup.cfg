[tool:pytest]
testpaths = tests
pythonpath = .

[coverage:run]
branch = True
source =
    app

[flake8]
# Longitud máxima de línea (120 es más práctico que 79 para proyectos modernos)
max-line-length = 120
# Excluir carpetas que no son código propio
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    *.egg-info
# Ignorar E203 (espacios antes de ':') porque es compatible con Black si se usa en el futuro
extend-ignore = E203
# Bugbear: activar advertencias extra de bugs comunes
extend-select = B

[isort]
profile = black
line_length = 120
skip = migrations, .venv, venv