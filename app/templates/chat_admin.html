<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkIT - Support Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f5f5f5; }

  /* Auth bar */
  .auth-bar { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
  .auth-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  .auth-bar button { padding: 8px 20px; background: #1a237e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .auth-bar button:hover { background: #283593; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 300px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
  .sidebar h3 { padding: 16px; border-bottom: 1px solid #e0e0e0; color: #333; }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
  .conv-item:hover { background: #f5f5f5; }
  .conv-item.active { background: #e8eaf6; border-left: 3px solid #1a237e; }
  .conv-item .name { font-weight: 600; font-size: 14px; color: #333; }
  .conv-item .preview { font-size: 12px; color: #888; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-item .time { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* Chat panel */
  .chat-panel { flex: 1; display: flex; flex-direction: column; background: #fafafa; }
  .chat-header { padding: 16px; background: #fff; border-bottom: 1px solid #e0e0e0; font-weight: 600; color: #333; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 16px; }

  /* Bubbles */
  .msg { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
  .msg.user { align-self: flex-start; background: #e0e0e0; color: #333; border-bottom-left-radius: 4px; }
  .msg.agent { align-self: flex-end; background: #1a237e; color: #fff; border-bottom-right-radius: 4px; }
  .msg .meta { font-size: 11px; margin-top: 4px; opacity: 0.7; }

  /* Input bar */
  .chat-input { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #e0e0e0; }
  .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
  .chat-input input:focus { border-color: #1a237e; }
  .chat-input button { padding: 10px 24px; background: #1a237e; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
  .chat-input button:hover { background: #283593; }
  .chat-input button:disabled { background: #ccc; cursor: default; }
</style>
</head>
<body>

<div class="auth-bar">
  <input type="text" id="tokenInput" placeholder="Paste your JWT access token here...">
  <button onclick="setToken()">Connect</button>
  <span id="authStatus" style="align-self:center;font-size:13px;color:#888;"></span>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Open Conversations</h3>
    <div class="conv-list" id="convList"></div>
  </div>

  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">Select a conversation</div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty">Select a conversation to start</div>
    </div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Type a reply..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem('chat_admin_token') || '';
  let selectedConvId = null;
  let pollConvInterval = null;
  let pollMsgInterval = null;
  let lastMessageTime = null;

  if (token) {
    document.getElementById('tokenInput').value = token;
    startPolling();
    document.getElementById('authStatus').textContent = 'Connected';
  }

  function setToken() {
    token = document.getElementById('tokenInput').value.trim();
    if (!token) return;
    localStorage.setItem('chat_admin_token', token);
    document.getElementById('authStatus').textContent = 'Connected';
    startPolling();
  }

  function apiHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    };
  }

  function startPolling() {
    if (pollConvInterval) clearInterval(pollConvInterval);
    fetchConversations();
    pollConvInterval = setInterval(fetchConversations, 5000);
  }

  async function fetchConversations() {
    try {
      const res = await fetch('/chat/conversations', { headers: apiHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      renderConversations(data.conversations || []);
    } catch (e) { console.error('Poll error:', e); }
  }

  function renderConversations(convs) {
    const list = document.getElementById('convList');
    list.innerHTML = '';
    convs.forEach(c => {
      const div = document.createElement('div');
      div.className = 'conv-item' + (c.id === selectedConvId ? ' active' : '');
      div.innerHTML = `
        <div class="name">${c.user_name}</div>
        <div class="preview">${c.last_message || 'No messages yet'}</div>
        <div class="time">${c.last_message_at ? new Date(c.last_message_at).toLocaleString() : ''}</div>
      `;
      div.onclick = () => selectConversation(c.id, c.user_name);
      list.appendChild(div);
    });
  }

  function selectConversation(id, name) {
    selectedConvId = id;
    lastMessageTime = null;
    document.getElementById('chatHeader').textContent = 'Chat with ' + name;
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('sendBtn').disabled = false;

    if (pollMsgInterval) clearInterval(pollMsgInterval);
    fetchMessages();
    pollMsgInterval = setInterval(fetchMessages, 3000);

    // Re-render sidebar to update active state
    fetchConversations();
  }

  async function fetchMessages() {
    if (!selectedConvId) return;
    let url = `/chat/conversation/${selectedConvId}/messages`;
    if (lastMessageTime) url += `?since=${encodeURIComponent(lastMessageTime)}`;

    try {
      const res = await fetch(url, { headers: apiHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      const msgs = data.messages || [];
      if (msgs.length === 0 && !lastMessageTime) {
        document.getElementById('chatMessages').innerHTML = '<div class="chat-empty">No messages yet</div>';
        return;
      }
      if (msgs.length > 0) {
        if (!lastMessageTime) document.getElementById('chatMessages').innerHTML = '';
        msgs.forEach(appendMessage);
        lastMessageTime = msgs[msgs.length - 1].created_at;
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
      }
    } catch (e) { console.error('Msg poll error:', e); }
  }

  function appendMessage(msg) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ' + msg.sender_role;
    const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `${msg.message}<div class="meta">${time}</div>`;
    container.appendChild(div);
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !selectedConvId) return;

    input.value = '';
    try {
      const res = await fetch(`/chat/conversation/${selectedConvId}/message`, {
        method: 'POST',
        headers: apiHeaders(),
        body: JSON.stringify({ message: text })
      });
      if (res.ok) {
        const data = await res.json();
        appendMessage(data.message);
        lastMessageTime = data.message.created_at;
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
      }
    } catch (e) { console.error('Send error:', e); }
  }
</script>
</body>
</html>
